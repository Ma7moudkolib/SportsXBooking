version: '3.8'

# ─────────────────────────────────────────────
# Base / Production compose file
# Use with: docker compose up
# ─────────────────────────────────────────────

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "YourStrong@Password123"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
      MSSQL_MEMORY_LIMIT_MB: "512"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P "YourStrong@Password123" -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - sports-network

  sports-booking-api:
    build:
      context: ./Backend
      dockerfile: Dockerfile
      target: production
    container_name: sports-booking-api
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__sqlConnection: "Server=db,1433;Database=SportsBookingDB;User Id=sa;Password=YourStrong@Password123;Encrypt=false;TrustServerCertificate=true;"
      Database__Server: "db,1433"
      Database__Name: "SportsBookingDB"
      Database__User: "sa"
      Database__Password: "YourStrong@Password123"
      Database__TrustServerCertificate: "true"
    depends_on:
       db:
        condition: service_healthy   # ← wait until SQL Server is actually ready
    networks:
      - sports-network
  sports-booking-frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: sports-booking-frontend
    ports:
      - "8082:80"
    depends_on:
      - sports-booking-api
    networks:
      - sports-network

volumes:
  sqldata:


networks:
  sports-network:
    driver: bridge
