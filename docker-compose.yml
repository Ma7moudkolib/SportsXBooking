version: '3.8'

# ─────────────────────────────────────────────
# Base / Production compose file
# Use with: docker compose up
# ─────────────────────────────────────────────

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "${SA_PASSWORD}"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "${SA_PASSWORD}" -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - sports-network

  sports-booking-api:
    build:
      context: ./Backend
      dockerfile: Dockerfile
      target: production          # ← explicit production stage
    container_name: sports-booking-api
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Database__Server: "db"
      Database__Name: "SportsBookingDB"
      Database__User: "sa"
      Database__Password: "${SA_PASSWORD}"
      Database__TrustServerCertificate: "true"
    depends_on:
      - db
#        condition: healthcheck
    networks:
      - sports-network

volumes:
  sqldata:


networks:
  sports-network:
    driver: bridge