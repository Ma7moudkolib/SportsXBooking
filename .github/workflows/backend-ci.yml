name: Backend CI

on:
  push:
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x
    - name: Restore dependencies
      run: dotnet restore Backend/SportsXBooking.sln
    - name: Build
      run: dotnet build Backend/SportsXBooking.sln --no-restore --configuration Release
    - name: Test
      run: dotnet test Backend/SportsXBooking.sln --no-build --configuration Release --verbosity normal
